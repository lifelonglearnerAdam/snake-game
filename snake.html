<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 贪吃蛇 · 多地图版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d0d1a;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  min-height: 100vh;
  min-height: 100dvh;
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  flex-direction: column;
  padding: 10px 5px 20px;
  overflow-y: auto;
}
.game-wrapper { text-align: center; max-width: 100vw; }
h1 {
  color: #50c850;
  font-size: clamp(16px, 4vw, 24px);
  margin-bottom: 4px;
  letter-spacing: 2px;
}
canvas {
  border: 3px solid #333;
  border-radius: 6px;
  display: block;
  margin: 0 auto;
  max-width: 100%;
  height: auto;
}
.info-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #b4b4b4;
  font-size: 13px;
  margin: 4px 4px 2px;
  max-width: 600px;
  margin-left: auto; margin-right: auto;
}
.info-bar .boost { color: #ffc832; }
.hints {
  color: #64646e;
  font-size: 11px;
  margin-top: 4px;
}
.back-link {
  display: inline-block;
  margin-top: 8px;
  color: #505060;
  text-decoration: none;
  font-size: 12px;
  transition: color 0.2s;
}
.back-link:hover { color: #50c850; }
.controls-section {
  margin-top: 8px;
  padding: 8px 14px;
  background: #10101f;
  border: 1px solid #252545;
  border-radius: 10px;
  display: inline-block;
  text-align: left;
  line-height: 1.6;
}
.controls-section .ctrl-title {
  color: #888;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.ctrl-row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
.ctrl-key {
  display: inline-block;
  background: #1a1a35;
  color: #b0b0e0;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 10px;
  font-family: monospace;
  border: 1px solid #2a2a50;
  min-width: 20px;
  text-align: center;
}
.ctrl-action { color: #707080; font-size: 11px; }
.mobile-hints { display: none; }
.desktop-hints { display: block; }

/* ===== 手机虚拟方向键 ===== */
.mobile-dpad {
  display: none;
  margin-top: 8px;
  user-select: none;
  -webkit-user-select: none;
}
.dpad-grid {
  display: grid;
  grid-template-columns: repeat(3, min(55px, 15vw));
  grid-template-rows: repeat(3, min(55px, 15vw));
  gap: 5px;
  justify-content: center;
}
.dpad-btn {
  background: rgba(80, 200, 80, 0.12);
  border: 2px solid rgba(80, 200, 80, 0.25);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.dpad-btn:active, .dpad-btn.pressed {
  background: rgba(80, 200, 80, 0.35);
  border-color: rgba(80, 200, 80, 0.5);
}
.dpad-arrow {
  width: 0; height: 0;
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-bottom: 18px solid rgba(200,255,200,0.6);
}
.dpad-arrow.down  { transform: rotate(180deg); }
.dpad-arrow.left  { transform: rotate(-90deg); }
.dpad-arrow.right { transform: rotate(90deg); }

.dpad-center {
  background: rgba(255, 200, 50, 0.1);
  border: 2px solid rgba(255, 200, 50, 0.25);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #ffc832;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.dpad-center:active, .dpad-center.pressed {
  background: rgba(255, 200, 50, 0.3);
  border-color: rgba(255, 200, 50, 0.5);
}
.dpad-center.boost-on {
  background: rgba(255, 200, 50, 0.2);
  border-color: rgba(255, 200, 50, 0.4);
}

.dpad-actions {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 8px;
}
.dpad-action-btn {
  background: rgba(100,100,180,0.1);
  border: 1px solid rgba(100,100,180,0.2);
  border-radius: 8px;
  color: #a0a0d0;
  font-size: 12px;
  padding: 8px 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.dpad-action-btn:active {
  background: rgba(100,100,180,0.25);
  border-color: rgba(100,100,180,0.4);
}
</style>
</head>
<body>
<div class="game-wrapper">
  <h1>🐍 贪吃蛇 · 多地图版</h1>
  <canvas id="gameCanvas"></canvas>
  <div class="info-bar">
    <span id="scoreDisplay">得分: 0</span>
    <span id="mapDisplay">地图: 经典模式</span>
    <span id="boostDisplay" class="boost"></span>
  </div>
  <div class="hints">方向键/WASD 移动 | 空格 加速 | P 暂停 | Tab 换地图</div>
  <a class="back-link" href="index.html">← 返回游戏大厅</a>
  <div class="controls-section">
    <div class="ctrl-title">🎮 操作说明</div>
    <div class="desktop-hints">
      <div class="ctrl-row"><span class="ctrl-key">↑</span><span class="ctrl-key">↓</span><span class="ctrl-key">←</span><span class="ctrl-key">→</span><span class="ctrl-action">或 WASD 控制方向</span></div>
      <div class="ctrl-row"><span class="ctrl-key">空格</span><span class="ctrl-action">按住加速</span></div>
      <div class="ctrl-row"><span class="ctrl-key">P</span><span class="ctrl-action">暂停 / 继续</span></div>
      <div class="ctrl-row"><span class="ctrl-key">Tab</span><span class="ctrl-action">切换地图</span></div>
      <div class="ctrl-row"><span class="ctrl-key">R</span><span class="ctrl-action">重新开始</span></div>
    </div>
    <div class="mobile-hints">
      <div class="ctrl-row"><span class="ctrl-key">🕹️ 方向键</span><span class="ctrl-action">下方虚拟按键控制方向</span></div>
      <div class="ctrl-row"><span class="ctrl-key">⚡ 闪电键</span><span class="ctrl-action">按住加速</span></div>
      <div class="ctrl-row"><span class="ctrl-key">🔄 🔁</span><span class="ctrl-action">换地图 / 重新开始</span></div>
    </div>
  </div>

  <!-- 手机虚拟方向键 -->
  <div class="mobile-dpad" id="mobileDpad">
    <div class="dpad-grid">
      <div></div>
      <div class="dpad-btn" id="btnUp" data-dir="UP">
        <div class="dpad-arrow"></div>
      </div>
      <div></div>
      <div class="dpad-btn" id="btnLeft" data-dir="LEFT">
        <div class="dpad-arrow left"></div>
      </div>
      <div class="dpad-center" id="btnBoost">⚡</div>
      <div class="dpad-btn" id="btnRight" data-dir="RIGHT">
        <div class="dpad-arrow right"></div>
      </div>
      <div></div>
      <div class="dpad-btn" id="btnDown" data-dir="DOWN">
        <div class="dpad-arrow down"></div>
      </div>
      <div></div>
    </div>
    <div class="dpad-actions">
      <button class="dpad-action-btn" id="btnMap">🔄 换地图</button>
      <button class="dpad-action-btn" id="btnRestart">🔁 重来</button>
    </div>
  </div>
</div>
<script>
const CELL = 20, GW = 30, GH = 20;
const W = GW * CELL, H = GH * CELL;
const FPS = 10, BOOST_FPS = Math.floor(FPS * 1.5);

const canvas = document.getElementById('gameCanvas');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

const MAPS = [
  { name: '经典模式', obstacles: new Set() },
  { name: '迷宫模式', obstacles: mazeObs() },
  { name: '四柱模式', obstacles: pillarsObs() },
  { name: '回廊模式', obstacles: corridorObs() },
  { name: '十字封锁', obstacles: crossObs() },
  { name: '棋盘模式', obstacles: checkerObs() },
  { name: '隧道模式', obstacles: tunnelObs() },
  { name: '散点模式', obstacles: scatterObs() },
];

function mazeObs() {
  const o = new Set();
  for (let x = 4; x < 26; x++) { if (x !== 14 && x !== 15) o.add(`${x},5`); }
  for (let x = 4; x < 26; x++) { if (x !== 14 && x !== 15) o.add(`${x},14`); }
  for (let y = 2; y < 18; y++) { if (y !== 9 && y !== 10) o.add(`9,${y}`); }
  for (let y = 2; y < 18; y++) { if (y !== 9 && y !== 10) o.add(`21,${y}`); }
  return o;
}
function pillarsObs() {
  const o = new Set();
  [[4,2],[22,2],[4,14],[22,14]].forEach(([px,py]) => {
    for (let dx = 0; dx < 3; dx++) for (let dy = 0; dy < 3; dy++) o.add(`${px+dx},${py+dy}`);
  });
  return o;
}
function corridorObs() {
  const o = new Set();
  for (let x = 0; x < GW; x++) { o.add(`${x},1`); o.add(`${x},${GH-2}`); }
  for (let y = 2; y < GH - 2; y++) { o.add(`2,${y}`); o.add(`${GW-3},${y}`); }
  for (let x = 6; x < GW - 6; x++) { o.add(`${x},5`); o.add(`${x},${GH-6}`); }
  for (let y = 6; y < GH - 6; y++) { o.add(`6,${y}`); o.add(`${GW-7},${y}`); }
  const gaps = [[0,1],[14,1],[29,1],[0,18],[14,18],[29,18],[2,3],[2,9],[2,16],[27,3],[27,9],[27,16],[9,5],[20,5],[9,14],[20,14]];
  gaps.forEach(([gx,gy]) => o.delete(`${gx},${gy}`));
  return o;
}
function crossObs() {
  const o = new Set();
  // 竖线 x=14,15，中间留口 y=8~11
  for (let y = 1; y < GH - 1; y++) {
    if (y < 8 || y > 11) { o.add(`14,${y}`); o.add(`15,${y}`); }
  }
  // 横线 y=9,10，中间留口 x=13~16
  for (let x = 0; x < GW; x++) {
    if (x < 13 || x > 16) { o.add(`${x},9`); o.add(`${x},10`); }
  }
  return o;
}
function checkerObs() {
  const o = new Set();
  // 每隔5格放2×2方块，交错排列
  for (let bx = 2; bx < GW - 2; bx += 6) {
    for (let by = 2; by < GH - 2; by += 5) {
      const offset = (Math.floor(by / 5) % 2) * 3; // 交错偏移
      const cx = bx + offset;
      if (cx > 0 && cx < GW - 2) {
        for (let dx = 0; dx < 2; dx++)
          for (let dy = 0; dy < 2; dy++)
            o.add(`${cx + dx},${by + dy}`);
      }
    }
  }
  return o;
}
function tunnelObs() {
  const o = new Set();
  // 上下两堵墙，中间隧道口
  for (let x = 0; x < GW; x++) {
    if (x < 11 || x > 18) { o.add(`${x},4`); o.add(`${x},5`); }
    if (x < 11 || x > 18) { o.add(`${x},14`); o.add(`${x},15`); }
  }
  // 左右两侧竖墙
  for (let y = 0; y < GH; y++) {
    if (y < 8 || y > 11) { o.add(`0,${y}`); o.add(`${GW-1},${y}`); }
  }
  return o;
}
function scatterObs() {
  const o = new Set();
  const blocks = [
    [2,3],[5,2],[8,4],[12,3],[15,2],[20,5],[25,3],[27,4],
    [3,7],[7,6],[10,8],[14,7],[18,6],[22,8],[26,7],
    [5,11],[9,10],[13,12],[16,10],[21,11],[25,12],
    [2,15],[6,14],[11,16],[15,15],[19,14],[23,16],[27,15],
    [4,17],[8,16],[13,17],[17,16],[22,17],[26,16]
  ];
  blocks.forEach(([x,y]) => {
    if (x > 1 && x < GW-2 && y > 1 && y < GH-2) o.add(`${x},${y}`);
  });
  return o;
}

const DIR = {
  UP: { x: 0, y: -1, opposite: 'DOWN' },
  DOWN: { x: 0, y: 1, opposite: 'UP' },
  LEFT: { x: -1, y: 0, opposite: 'RIGHT' },
  RIGHT: { x: 1, y: 0, opposite: 'LEFT' },
};

let snake, food, score, running, paused, speedBoost, currentMap, obstacles, direction, nextDir;
let frameAccum = 0, lastTime = 0;

function reset() {
  const cx = Math.floor(GW / 2), cy = Math.floor(GH / 2);
  snake = [{ x: cx, y: cy }, { x: cx - 1, y: cy }, { x: cx - 2, y: cy }];
  direction = DIR.RIGHT;
  nextDir = DIR.RIGHT;
  score = 0; running = true; paused = false; speedBoost = false;
  obstacles = MAPS[currentMap].obstacles;
  spawnFood(); updateUI();
}

function spawnFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  const available = [];
  for (let x = 0; x < GW; x++)
    for (let y = 0; y < GH; y++) {
      const key = `${x},${y}`;
      if (!occupied.has(key) && !obstacles.has(key)) available.push({ x, y });
    }
  food = available.length > 0 ? available[Math.floor(Math.random() * available.length)] : (running = false, null);
}

function moveSnake() {
  direction = nextDir;
  const head = snake[0];
  let nh = { x: (head.x + direction.x + GW) % GW, y: (head.y + direction.y + GH) % GH };
  if (snake.some(s => s.x === nh.x && s.y === nh.y)) { running = false; return; }
  if (obstacles.has(`${nh.x},${nh.y}`)) { running = false; return; }
  snake.unshift(nh);
  if (food && nh.x === food.x && nh.y === food.y) { score += 10; spawnFood(); if (!food) running = false; }
  else snake.pop();
  updateUI();
}

function gameLoop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = ts - lastTime; lastTime = ts;
  const interval = 1000 / (speedBoost ? BOOST_FPS : FPS);
  if (running && !paused) {
    frameAccum += dt;
    while (frameAccum >= interval) { frameAccum -= interval; moveSnake(); if (!running) break; }
  }
  draw();
  requestAnimationFrame(gameLoop);
}

function draw() {
  ctx.fillStyle = '#14141e'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#232332'; ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += CELL) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y <= H; y += CELL) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  obstacles.forEach(key => {
    const [ox, oy] = key.split(',').map(Number);
    ctx.fillStyle = '#505064'; ctx.fillRect(ox * CELL + 1, oy * CELL + 1, CELL - 2, CELL - 2);
    ctx.strokeStyle = '#78788c'; ctx.lineWidth = 1; ctx.strokeRect(ox * CELL + 1, oy * CELL + 1, CELL - 2, CELL - 2);
  });
  if (food) {
    const t = Date.now() / 1000, pulse = 1 + 0.15 * Math.sin(t * 4);
    const cx = food.x * CELL + CELL / 2, cy = food.y * CELL + CELL / 2, r = (CELL / 2 - 2) * pulse;
    ctx.fillStyle = '#dc3c3c'; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffb4b4'; ctx.beginPath(); ctx.arc(cx - r / 3, cy - r / 3, Math.max(2, r / 3), 0, Math.PI * 2); ctx.fill();
  }
  snake.forEach((seg, i) => {
    ctx.fillStyle = i === 0 ? '#50c850' : '#3ca03c';
    ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1; ctx.strokeRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
    if (i === 0) drawEyes(seg);
  });
  if (!running) drawOverlay();
  if (paused) drawPause();
}

function drawEyes(seg) {
  const x = seg.x * CELL, y = seg.y * CELL, es = 4, off = 5;
  let pts;
  if (direction === DIR.RIGHT) pts = [[x + CELL - 8, y + CELL / 2 - off], [x + CELL - 8, y + off + 3]];
  else if (direction === DIR.LEFT) pts = [[x + 8, y + CELL / 2 - off], [x + 8, y + off + 3]];
  else if (direction === DIR.UP) pts = [[x + off, y + 8], [x + CELL - off - 3, y + 8]];
  else pts = [[x + off, y + CELL - 8], [x + CELL - off - 3, y + CELL - 8]];
  pts.forEach(([ex, ey]) => {
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ex, ey, es, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(ex, ey, 2, 0, Math.PI * 2); ctx.fill();
  });
}

function drawOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ff5050'; ctx.font = 'bold 26px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'center'; ctx.fillText('游戏结束', W / 2, H / 2 - 30);
  ctx.fillStyle = '#b4b4b4'; ctx.font = '15px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText(`地图: ${MAPS[currentMap].name}  得分: ${score}`, W / 2, H / 2 + 10);
  ctx.fillStyle = '#969696'; ctx.font = '13px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText('按 R 重新开始 | Tab 换地图', W / 2, H / 2 + 40);
  ctx.textAlign = 'start';
}

function drawPause() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#b4b4b4'; ctx.font = 'bold 24px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'center'; ctx.fillText('已暂停', W / 2, H / 2 - 10);
  ctx.font = '13px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText('按 P 继续', W / 2, H / 2 + 25);
  ctx.textAlign = 'start';
}

function updateUI() {
  document.getElementById('scoreDisplay').textContent = `得分: ${score}`;
  document.getElementById('mapDisplay').textContent = `地图: ${MAPS[currentMap].name}`;
  document.getElementById('boostDisplay').textContent = speedBoost ? '加速中' : '';
}

// ===== 手机虚拟方向键按钮控制 =====
function setupDpad() {
  const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  const dpad = document.getElementById('mobileDpad');
  if (!isMobile) { dpad.style.display = 'none'; return; }
  dpad.style.display = 'block';

  // 方向按钮
  document.querySelectorAll('.dpad-btn').forEach(btn => {
    const dirName = btn.dataset.dir;
    const dirObj = DIR[dirName];

    function press(e) {
      e.preventDefault();
      if (!running) { reset(); return; }
      if (paused) return;
      btn.classList.add('pressed');
      if (dirObj && dirObj !== DIR[direction.opposite]) {
        nextDir = dirObj;
      }
    }
    function release(e) {
      e.preventDefault();
      btn.classList.remove('pressed');
    }

    btn.addEventListener('mousedown', press);
    btn.addEventListener('touchstart', press, { passive: false });
    btn.addEventListener('mouseup', release);
    btn.addEventListener('mouseleave', release);
    btn.addEventListener('touchend', release);
    btn.addEventListener('touchcancel', release);
  });

  // 加速按钮
  const btnBoost = document.getElementById('btnBoost');
  function boostOn(e) {
    e.preventDefault();
    if (!running || paused) return;
    speedBoost = true;
    btnBoost.classList.add('pressed');
    updateUI();
  }
  function boostOff(e) {
    e.preventDefault();
    speedBoost = false;
    btnBoost.classList.remove('pressed');
    updateUI();
  }
  btnBoost.addEventListener('mousedown', boostOn);
  btnBoost.addEventListener('touchstart', boostOn, { passive: false });
  btnBoost.addEventListener('mouseup', boostOff);
  btnBoost.addEventListener('mouseleave', boostOff);
  btnBoost.addEventListener('touchend', boostOff);
  btnBoost.addEventListener('touchcancel', boostOff);

  // 换地图
  document.getElementById('btnMap').addEventListener('click', e => {
    e.preventDefault();
    currentMap = (currentMap + 1) % MAPS.length; reset();
  });
  document.getElementById('btnMap').addEventListener('touchstart', e => {
    e.preventDefault();
    currentMap = (currentMap + 1) % MAPS.length; reset();
  });

  // 重新开始
  document.getElementById('btnRestart').addEventListener('click', e => {
    e.preventDefault();
    if (!running) reset();
    else { currentMap = currentMap; reset(); }
  });
  document.getElementById('btnRestart').addEventListener('touchstart', e => {
    e.preventDefault();
    if (!running) reset();
    else reset();
  });
}

document.addEventListener('keydown', e => {
  const keyMap = {
    ArrowUp: DIR.UP, w: DIR.UP, W: DIR.UP,
    ArrowDown: DIR.DOWN, s: DIR.DOWN, S: DIR.DOWN,
    ArrowLeft: DIR.LEFT, a: DIR.LEFT, A: DIR.LEFT,
    ArrowRight: DIR.RIGHT, d: DIR.RIGHT, D: DIR.RIGHT,
  };
  if (running && !paused) {
    if (keyMap[e.key] && keyMap[e.key] !== DIR[direction.opposite]) nextDir = keyMap[e.key];
    if (e.key === ' ') { e.preventDefault(); speedBoost = true; updateUI(); }
    if (e.key === 'p' || e.key === 'P') { paused = true; }
    if (e.key === 'Tab') { e.preventDefault(); currentMap = (currentMap + 1) % MAPS.length; reset(); }
  } else if (!running) {
    if (e.key === 'r' || e.key === 'R') reset();
    if (e.key === 'Tab') { e.preventDefault(); currentMap = (currentMap + 1) % MAPS.length; reset(); }
  } else if (paused) {
    if (e.key === 'p' || e.key === 'P') { paused = false; lastTime = 0; }
  }
});

document.addEventListener('keyup', e => {
  if (e.key === ' ') { speedBoost = false; updateUI(); }
});

currentMap = 0; reset();
requestAnimationFrame(gameLoop);

// 自动检测平台显示对应操作说明 + 虚拟方向键
(function() {
  const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  document.querySelector('.desktop-hints').style.display = isMobile ? 'none' : 'block';
  document.querySelector('.mobile-hints').style.display = isMobile ? 'block' : 'none';
  setupDpad();
})();
</script>
</body>
</html>
