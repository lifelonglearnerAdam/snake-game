<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦖 小恐龙 · Dino Runner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  flex-direction: column;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}
.game-wrapper { text-align: center; }
h1 {
  color: #d8a050;
  font-size: 24px;
  margin-bottom: 6px;
  letter-spacing: 2px;
}
canvas {
  border: 3px solid #333;
  border-radius: 6px;
  display: block;
  margin: 0 auto;
  max-width: 100%;
  height: auto;
}
.info {
  color: #b4b4b4;
  font-size: 14px;
  margin-top: 8px;
}
.hints {
  color: #64646e;
  font-size: 12px;
  margin-top: 6px;
}
.back-link {
  display: inline-block;
  margin-top: 14px;
  color: #505060;
  text-decoration: none;
  font-size: 13px;
  transition: color 0.2s;
}
.back-link:hover { color: #d8a050; }
.controls-section {
  margin-top: 16px;
  padding: 12px 20px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 10px;
  display: inline-block;
  text-align: left;
  line-height: 1.8;
}
.controls-section .ctrl-title {
  color: #777;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.ctrl-row { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
.ctrl-key {
  display: inline-block;
  background: #2a2a2a;
  color: #c8c8c8;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-family: monospace;
  border: 1px solid #444;
  min-width: 24px;
  text-align: center;
}
.ctrl-action { color: #808080; font-size: 12px; }
.mobile-hints { display: none; }
.desktop-hints { display: block; }
</style>
</head>
<body>
<div class="game-wrapper">
  <h1>🦖 小恐龙跑酷</h1>
  <canvas id="gameCanvas"></canvas>
  <div class="info"><span id="scoreDisplay">得分: 0</span> | <span id="bestDisplay">最佳: 0</span></div>
  <div class="hints">点击/空格/↑ 跳跃 | ↓ 或长按蹲下 | 手机兼容</div>
  <a class="back-link" href="index.html">← 返回游戏大厅</a>
  <div class="controls-section">
    <div class="ctrl-title">🎮 操作说明</div>
    <div class="desktop-hints">
      <div class="ctrl-row"><span class="ctrl-key">空格</span><span class="ctrl-key">↑</span><span class="ctrl-action">跳跃</span></div>
      <div class="ctrl-row"><span class="ctrl-key">↓</span><span class="ctrl-action">蹲下（躲避飞鸟）</span></div>
      <div class="ctrl-row"><span class="ctrl-key">鼠标点击</span><span class="ctrl-action">点击画面跳跃</span></div>
    </div>
    <div class="mobile-hints">
      <div class="ctrl-row"><span class="ctrl-key">👆 点击</span><span class="ctrl-action">跳跃</span></div>
      <div class="ctrl-row"><span class="ctrl-key">👆 长按</span><span class="ctrl-action">蹲下（躲避飞鸟）</span></div>
    </div>
  </div>
</div>
<script>
const W = 700, H = 300;
const canvas = document.getElementById('gameCanvas');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

// —— Constants tuned for 60 fps baseline ——
const GROUND_Y = 240;
const GRAVITY   = 0.7;
const JUMP_VEL  = -12;
const FRAME_MS  = 1000 / 60;   // one frame at 60 fps (≈16.67 ms)

// —— Game state ——
let dinoY, dinoVel, onGround, obstacles, score, best, running, started;
let gameSpeed, frameCount, spawnTimer;
let ducking    = false;
let touchTimer = null;
let lastTime   = 0;              // previous rAF timestamp (delta-time)

function reset() {
  dinoY      = GROUND_Y;
  dinoVel    = 0;
  onGround   = true;
  obstacles  = [];
  score      = 0;
  running    = true;
  started    = false;
  gameSpeed  = 5;
  frameCount = 0;
  spawnTimer = 0;
  ducking    = false;
  lastTime   = 0;
  if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
  best = Math.max(best || 0, parseInt(localStorage.getItem('dinoBest') || '0'));
  document.getElementById('bestDisplay').textContent = `最佳: ${best}`;
  updateUI();
}

function jump() {
  if (!running) { reset(); return; }
  if (!started) { started = true; }
  if (onGround) {
    dinoVel   = JUMP_VEL;
    onGround  = false;
    ducking   = false;
  }
}

function duck(isDown) {
  if (!running || !started) return;
  ducking = isDown && onGround;
}

function spawnObstacle() {
  const r = Math.random();
  if (r < 0.65) {
    // cactus
    const h = 25 + Math.random() * 20;
    obstacles.push({ x: W, type: 'cactus', w: 16, h: h });
  } else {
    // pterodactyl
    const y = GROUND_Y - 35 - Math.random() * 40;
    obstacles.push({ x: W, type: 'bird', w: 30, h: 20, y: y });
  }
}

/* ── core update — everything scaled by delta ──────────── */

function update(delta) {
  if (!running || !started) return;

  // frameCount drives *animation* only (legs / wings)
  frameCount += delta;

  // speed climbs with score (unchanged formula)
  gameSpeed = 5 + Math.floor(score / 300) * 0.8;
  if (gameSpeed > 14) gameSpeed = 14;

  // ── physics (delta-scaled) ──
  if (!onGround) {
    dinoVel += GRAVITY * delta;
    dinoY   += dinoVel  * delta;
    if (dinoY >= GROUND_Y) {
      dinoY    = GROUND_Y;
      dinoVel  = 0;
      onGround = true;
    }
  }

  // ── spawning (timer-based, immune to frame-rate) ──
  spawnTimer += delta;
  const spawnGap = Math.max(40, 110 - score / 30);
  while (spawnTimer >= spawnGap) {
    spawnTimer -= spawnGap;
    spawnObstacle();
  }

  // ── move obstacles (delta-scaled) ──
  for (let o of obstacles) o.x -= gameSpeed * delta;
  obstacles = obstacles.filter(o => o.x > -50);

  // ── score (distance, not frame-count) ──
  score += delta;
  if (Math.floor(score) % 100 === 0) updateUI();

  // ── collision ──
  const dBBox = {
    x: 50,
    y: dinoY - (ducking ? 30 : 44),
    w: ducking ? 44 : 28,
    h: ducking ? 30 : 44
  };

  for (let o of obstacles) {
    let ob;
    if (o.type === 'cactus') {
      ob = { x: o.x + 4, y: GROUND_Y - o.h, w: o.w - 8, h: o.h };
    } else {
      ob = { x: o.x + 4, y: o.y, w: o.w - 8, h: o.h - 4 };
    }
    if (dBBox.x < ob.x + ob.w && dBBox.x + dBBox.w > ob.x &&
        dBBox.y < ob.y + ob.h && dBBox.y + dBBox.h > ob.y) {
      die();
      return;
    }
  }
}

/* ── death ─────────────────────────────────────────────── */

function die() {
  running = false;
  if (score > best) {
    best = score;
    localStorage.setItem('dinoBest', best);
    document.getElementById('bestDisplay').textContent = `最佳: ${best}`;
  }
  updateUI();
}

/* ── drawing ───────────────────────────────────────────── */

function draw() {
  // background
  ctx.fillStyle = '#f7f7f7';
  ctx.fillRect(0, 0, W, H);

  // ground line
  ctx.strokeStyle = '#535353';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(W, GROUND_Y);
  ctx.stroke();

  // scrolling ground dots
  const dotOffset = (frameCount * gameSpeed) % 20;
  ctx.fillStyle = '#aaa';
  for (let x = -dotOffset; x < W; x += 20) {
    ctx.fillRect(x, GROUND_Y + 8, 3, 3);
  }

  // obstacles
  for (let o of obstacles) {
    if (o.type === 'cactus') {
      drawCactus(o.x, GROUND_Y - o.h, o.h);
    } else {
      drawBird(o.x, o.y);
    }
  }

  // dino
  if (ducking && onGround) {
    drawDinoDuck(50, dinoY);
  } else {
    drawDino(50, dinoY, onGround);
  }

  // score
  ctx.fillStyle = '#535353';
  ctx.font = 'bold 18px "Courier New", monospace';
  ctx.textAlign = 'right';
  ctx.fillText(Math.floor(score / 10).toString().padStart(5, '0'), W - 20, 30);
  ctx.textAlign = 'start';

  // start overlay
  if (!started && running) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#535353';
    ctx.font = 'bold 22px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('按空格键或 ↑ 开始游戏', W / 2, H / 2 - 10);
    ctx.textAlign = 'start';
  }

  // game over
  if (!running) {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#333';
    ctx.font = 'bold 24px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', W / 2, H / 2 - 30);
    ctx.fillStyle = '#535353';
    ctx.font = '15px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText(`得分: ${Math.floor(score / 10)}    最佳: ${Math.floor(best / 10)}`, W / 2, H / 2 + 5);
    ctx.fillStyle = '#999';
    ctx.font = '13px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText('按空格或 ↑ 重新开始', W / 2, H / 2 + 35);
    ctx.textAlign = 'start';
  }
}

/* ── dino drawing ──────────────────────────────────────── */

function drawDino(x, y, onGround) {
  const top = y - 44;
  ctx.fillStyle = '#535353';
  ctx.fillRect(x + 10, top + 8, 18, 24);          // body
  ctx.fillRect(x + 18, top, 16, 14);               // head
  ctx.fillStyle = '#fff';
  ctx.fillRect(x + 26, top + 4, 4, 4);             // eye white
  ctx.fillStyle = '#535353';
  ctx.fillRect(x + 28, top + 5, 2, 2);             // pupil
  ctx.fillRect(x + 30, top + 10, 8, 2);            // mouth
  // legs
  if (onGround) {
    const legPhase = Math.floor(frameCount / 4) % 2;
    ctx.fillRect(x + 10, top + 32, 6, 12);
    ctx.fillRect(x + 18, top + 32, 6, legPhase ? 8 : 12);
    ctx.fillRect(x + 24, top + 32, 4, legPhase ? 12 : 8);
  } else {
    ctx.fillRect(x + 14, top + 32, 4, 8);
    ctx.fillRect(x + 20, top + 28, 4, 8);
  }
  ctx.fillRect(x + 6, top + 14, 6, 3);             // arm
  ctx.fillRect(x, top + 12, 12, 4);                 // tail
  ctx.fillRect(x - 2, top + 10, 4, 2);
}

function drawDinoDuck(x, y) {
  const top = y - 30;
  ctx.fillStyle = '#535353';
  ctx.fillRect(x, top, 44, 16);                     // flat body
  ctx.fillStyle = '#fff';
  ctx.fillRect(x + 32, top + 4, 4, 4);              // eye
  ctx.fillStyle = '#535353';
  ctx.fillRect(x + 34, top + 5, 2, 2);              // pupil
  ctx.fillRect(x + 8, top + 16, 6, 10);             // legs
  ctx.fillRect(x + 30, top + 16, 6, 10);
}

function drawCactus(x, y, h) {
  ctx.fillStyle = '#535353';
  ctx.fillRect(x + 4, y + 4, 8, h - 4);             // stem
  const seed = Math.floor(x);
  if (seed % 3 === 0) {
    ctx.fillRect(x + 12, y + h * 0.3, 6, 4);
    ctx.fillRect(x + 14, y + h * 0.3 - 8, 4, 8);
  }
  if (seed % 3 === 1) {
    ctx.fillRect(x - 6, y + h * 0.5, 6, 4);
    ctx.fillRect(x - 6, y + h * 0.5 - 8, 4, 8);
  }
  ctx.fillRect(x + 4, y, 8, 4);                     // top
}

function drawBird(x, y) {
  ctx.fillStyle = '#535353';
  const wingPhase = Math.floor(frameCount / 6) % 2;
  ctx.fillRect(x, y + 6, 30, 8);                    // body
  ctx.fillRect(x + 24, y + 4, 8, 4);                // beak
  if (wingPhase === 0) {
    ctx.fillRect(x + 10, y, 10, 8);                 // wings up
  } else {
    ctx.fillRect(x + 10, y + 12, 10, 8);            // wings down
  }
}

function updateUI() {
  document.getElementById('scoreDisplay').textContent = `得分: ${Math.floor(score / 10)}`;
}

/* ── delta-time game loop ─────────────────────────────── */

function gameLoop(timestamp) {
  if (lastTime === 0) lastTime = timestamp;
  let delta = (timestamp - lastTime) / FRAME_MS;
  lastTime = timestamp;

  // clamp — prevents the game from "teleporting" after the
  // tab was backgrounded / device went to sleep.
  if (delta > 3) delta = 3;

  update(delta);
  draw();
  requestAnimationFrame(gameLoop);
}

/* ── controls ──────────────────────────────────────────── */

// keyboard
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowUp')    { e.preventDefault(); jump(); }
  if (e.key === 'ArrowDown')                   { e.preventDefault(); duck(true); }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowDown')                   { e.preventDefault(); duck(false); }
});

// mouse click
canvas.addEventListener('click', e => { e.preventDefault(); jump(); });

// touch — short tap = jump, long press = duck (mobile compatible)
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!running) { jump(); return; }
  if (!started) { jump(); return; }
  touchTimer = setTimeout(() => { duck(true); }, 200);
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (touchTimer) {
    clearTimeout(touchTimer);
    touchTimer = null;
    if (!ducking) jump();
  }
  duck(false);
}, { passive: false });
canvas.addEventListener('touchcancel', e => {
  if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
  duck(false);
});

/* ── boot ──────────────────────────────────────────────── */

reset();
requestAnimationFrame(gameLoop);

// auto-detect platform to show relevant control hints
(function() {
  const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  document.querySelector('.desktop-hints').style.display = isMobile ? 'none' : 'block';
  document.querySelector('.mobile-hints').style.display = isMobile ? 'block' : 'none';
})();
</script>
</body>
</html>
